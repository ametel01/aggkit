services:
  # L1 Anvil Node (Ethereum Mainnet fork)
  anvil-l1:
    image: agg-sandbox-anvil-mainnet:latest
    container_name: aggkit-anvil-l1
    ports:
      - "8545:8545"
    networks:
      - aggkit-sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # L2 Anvil Node (Sovereign chain)  
  anvil-l2:
    image: agg-sandbox-anvil-polygon:latest
    container_name: aggkit-anvil-l2
    ports:
      - "8546:8545"
    networks:
      - aggkit-sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # AggKit Sandbox
  aggkit-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: aggkit-sandbox
    ports:
      - "5577:5577"   # Bridge API
      - "8555:8555"   # RPC API
      - "8080:8080"   # Telemetry/Metrics
    environment:
      # Sandbox Configuration
      AGGKIT_SANDBOX_ENABLED: "true"
      AGGKIT_SANDBOX_AUTO_SETTLE: "true"
      AGGKIT_SANDBOX_SETTLEMENT_DELAY: "5s"
      AGGKIT_SANDBOX_MOCK_FINALIZATION: "true"
      AGGKIT_SANDBOX_INSTANT_CLAIMS: "true"
      
      # Network Configuration
      AGGKIT_NETWORK_ID: "1338"
      AGGKIT_L1_CHAIN_ID: "31337"
      AGGKIT_L2_CHAIN_ID: "31338"
      AGGKIT_L1_URL: "http://anvil-l1:8545"
      AGGKIT_L2_URL: "http://anvil-l2:8545"
      
      # Service Configuration
      AGGKIT_REST_HOST: "0.0.0.0"
      AGGKIT_REST_PORT: "5577"
      AGGKIT_RPC_HOST: "0.0.0.0"
      AGGKIT_RPC_PORT: "8555"
      AGGKIT_TELEMETRY_PORT: "8080"
      
      # Components
      AGGKIT_COMPONENTS: "bridge,aggoracle"
      
      # Database
      AGGKIT_DATABASE_DRIVER: "sqlite3"
      AGGKIT_DATABASE_NAME: "/app/data/aggkit_sandbox.db"
      
      # Contract Addresses (Anvil default accounts)
      AGGKIT_POLYGON_BRIDGE_ADDRESS: "0x2a3DD3EB832aF982ec71669E178424b10Dca2EDe"
      AGGKIT_EVM_SENDER: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      
      # Logging
      AGGKIT_LOG_LEVEL: "debug"
      
      # Dependency waiting
      AGGKIT_WAIT_FOR_L1: "true"
      AGGKIT_WAIT_FOR_L2: "true"
    volumes:
      # Persistent data
      - aggkit-data:/app/data
      # Optional: Mount custom config
      # - ./config/custom.toml:/app/config/custom.toml:ro
      # Optional: Mount logs
      - ./logs:/app/logs
    depends_on:
      anvil-l1:
        condition: service_healthy
      anvil-l2:
        condition: service_healthy
    networks:
      - aggkit-sandbox
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5577/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Optional: Bridge Contract Deployer
  bridge-deployer:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: aggkit-bridge-deployer
    volumes:
      - ./contracts:/contracts:ro
      - ./scripts:/scripts:ro
    environment:
      L1_RPC_URL: "http://anvil-l1:8545"
      L2_RPC_URL: "http://anvil-l2:8545"
      PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
    command: |
      sh -c "
        echo 'Waiting for Anvil nodes to be ready...'
        sleep 10
        echo 'Deploying bridge contracts...'
        # Add your contract deployment commands here
        # forge create --rpc-url $$L1_RPC_URL --private-key $$PRIVATE_KEY contracts/Bridge.sol:Bridge
        echo 'Bridge contracts deployment completed'
        tail -f /dev/null
      "
    depends_on:
      anvil-l1:
        condition: service_healthy
      anvil-l2:
        condition: service_healthy
    networks:
      - aggkit-sandbox
    profiles:
      - contracts

volumes:
  aggkit-data:
    driver: local

networks:
  aggkit-sandbox:
    driver: bridge 